name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atendai
          POSTGRES_PASSWORD: atendai
          POSTGRES_DB: atendai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://atendai:atendai@localhost:5432/atendai
      REDIS_URL: redis://localhost:6379/0
      CHROMA_HOST: localhost
      CHROMA_PORT: 8001
      OPENAI_API_KEY: test-key
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: test
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check src tests
          black --check src tests

      - name: Run unit tests
        run: pytest tests/unit -v --cov=src --cov-report=xml -m "not integration and not e2e"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
